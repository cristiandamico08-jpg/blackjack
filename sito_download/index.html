<html>
<head>
    <title>BlackJack</title>

            <h2>Download per Windows</h2>

            <p>In caso non si abbia Java 25.0.2 lo puoi scaricare qui!</p>

        <div class="appleBox">

            <center><img src="assets/img/appleLogo.png" id="logoApple"></center> <br/><br/>
            <div class="bottoniMac">
                <button onclick="download(2)"  id="download64">Download (ARM64)</button>
                <button onclick="download(3)"  id="downloadARM64">Download (x64)</button>
            </div>
            <p>In caso non si abbia Java 25.0.2 lo puoi scaricare qui!</p>
            <div class="bottoniMac">
                <button onclick="download(2)"  id="downloadJava64">Download (ARM64)</button>
                <button onclick="download(3)"  id="downloadJavaARM64">Download (x64)</button>

    <script src = "src/js/script.js"></script>
